apiVersion: v1
kind: ServiceAccount
metadata:
  name: inbox-worker
  namespace: apps
  annotations:
    # Workload Identity — links to the GCP service account created in terraform/iam.tf
    iam.gke.io/gcp-service-account: inbox-worker@bens-project-462804.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inbox-processor
  namespace: apps
  labels:
    app: inbox-processor
spec:
  # replicas managed by KEDA — start at 0
  replicas: 0
  selector:
    matchLabels:
      app: inbox-processor
  template:
    metadata:
      labels:
        app: inbox-processor
    spec:
      serviceAccountName: inbox-worker
      containers:
        - name: inbox-processor
          # Build and push before applying:
          #   docker build --platform linux/amd64 \
          #     -t us-central1-docker.pkg.dev/bens-project-462804/email-analysis/inbox-worker:latest \
          #     /path/to/inbox
          #   docker push us-central1-docker.pkg.dev/bens-project-462804/email-analysis/inbox-worker:latest
          image: us-central1-docker.pkg.dev/bens-project-462804/email-analysis/inbox-worker:latest
          command: ["python", "scripts/worker.py"]
          envFrom:
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: inbox-azure-credentials
          env:
            - name: GCP_PROJECT_ID
              value: "bens-project-462804"
            - name: MSAL_SECRET_NAME
              value: "msal-token-cache"
            - name: POSTGRES_HOST
              value: "postgres.apps.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
