apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: apps
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: openclaw
          # Build and push before applying:
          #   docker build --platform linux/amd64 \
          #     -t us-central1-docker.pkg.dev/bens-project-462804/openclaw/openclaw:latest \
          #     k8s/openclaw/
          #   docker push us-central1-docker.pkg.dev/bens-project-462804/openclaw/openclaw:latest
          image: us-central1-docker.pkg.dev/bens-project-462804/openclaw/openclaw:latest
          ports:
            - containerPort: 18789
          env:
            - name: NODE_ENV
              value: production
            - name: XDG_CONFIG_HOME
              value: /home/node/.openclaw
            - name: HOME
              value: /home/node
          envFrom:
            - secretRef:
                name: openclaw-credentials
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
