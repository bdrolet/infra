apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: observability
  labels:
    managed-by: kubectl
spec:
  parentRefs:
    - name: shared-gateway
      namespace: infra
      sectionName: https
  hostnames:
    - observability.drolet.cloud
  rules:
    - backendRefs:
        - name: grafana
          port: 80
