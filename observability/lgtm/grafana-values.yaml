# helm repo add grafana https://grafana.github.io/helm-charts
# helm upgrade --install grafana grafana/grafana -n observability -f grafana-values.yaml

# Set admin credentials via a pre-created secret (see grafana-secret.yaml.example).
# Do not commit real credentials.
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

nodeSelector:
  cloud.google.com/gke-spot: "true"

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Ingress is managed separately as GCE-specific resources (grafana-ingress.yaml).
ingress:
  enabled: false

service:
  type: ClusterIP
  port: 80

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.observability.svc.cluster.local
        isDefault: true
        access: proxy
        jsonData:
          timeInterval: 30s

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy
        jsonData:
          # Extracts traceId from log lines so Loki → Tempo links work out of the box.
          # Assumes your app logs JSON with a "traceId" field (e.g. via pino/winston).
          derivedFields:
            - name: TraceID
              datasourceUid: tempo
              matcherRegex: '"traceId"[:\s]+"?([a-f0-9]+)"?'
              url: "$${__value.raw}"

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.observability.svc.cluster.local:3100
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            tags:
              - key: service.name
                value: service_name
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki
